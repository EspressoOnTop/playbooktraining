- name: --install alert manager--
  hosts: prometheus
  become: yes

  tasks:

    - name: create alert user
      user:
        name: alerti
        shell: /usr/sbin/nologin

    - name: create directories
      file:
        path: "{{ item }}"
        state: directory
        owner: alerti
        group: alerti
      loop:
        -  /etc/alertmanger
        - /var/lib/alertmanager

    - name: download alerti
      get_url:
        url: https://github.com/prometheus/alertmanager/releases/download/v0.31.0/alertmanager-0.31.0.linux-arm64.tar.gz
        dest: /tmp/alertmanager.tar.gz

    - name: extract alerti
      unarchive:
        src: /tmp/alertmanager.tar.gz
        dest: /tmp
        remote_src: yes

    - name: create systemd service
      copy:
        dest: /etc/systemd/system/alertmanager.service
        content: |
          [Unit]
          Description=alertmanager
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=alerti
          Group=alerti
          Type=simple
          ExecStart=/usr/local/bin/alertmanager

          [Install]
          WantedBy=multi-user.target

    - name: restart systemd
      command: systemctl restart alertmanager.service

    - name: start alterti
      systemd:
        name: alertmanager
        enabled: yes
        state: started
