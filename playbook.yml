---

- name: --Install Prometheus--
  hosts: prometheus
  become: yes

  tasks:

    - name: create prometheus user
      user:
        name: prometheus
        shell: /usr/sbin/nologin

    - name: create directories
      file:
        path: "{{ item }}"
        state: directory
        owner: prometheus
        group: prometheus
      loop:
        - /etc/prometheus
        - /var/lib/prometheus

    - name: download prometheus
      get_url:
        url: https://github.com/prometheus/prometheus/releases/latest/download/prometheus-3.10.0.linux-arm64.tar.gz
        dest: /tmp/prometheus.tar.gz

    - name: extract prometheus
      unarchive:
        src: /tmp/prometheus.tar.gz
        dest: /tmp
        remote_src: yes

    - name: create systemd service
      copy:
        dest: /etc/systemd/system/prometheus.service
        content: |
          [Unit]
          Description=prometheus
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=prometheus
          Group=prometheus
          Type=simple
          ExecStart=/tmp/prometheus.tar.gz

          [Install]
          WantedBy=multi-user.target

    - name: restart systemd
      command: systemctl restart prometheus.service

    - name: start prometheus
      systemd:
        name: prometheus
        enabled: yes
        state: started

